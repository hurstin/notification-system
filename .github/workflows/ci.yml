name: Microservices CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Lint, Test, and Build for each service
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # List all your service folder names here
        service: [api-gateway, user-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # This tells npm where to find the lockfile for caching
          cache-dependency-path: ./${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Run Lint
        working-directory: ./${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run Unit Tests
        working-directory: ./${{ matrix.service }}
        run: npm run test --if-present

      - name: Build Project
        working-directory: ./${{ matrix.service }}
        run: npm run build --if-present

