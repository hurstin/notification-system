name: Microservices CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Lint the entire monorepo
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # Job 2: Test and Build for each service
  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        # List all your service folder names here
        service: [api-gateway, user-service, email-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # This tells npm where to find the lockfile for caching
          # In a monorepo, there's only one package-lock.json at the root
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        # Run tests specifically for the matrix app target
        run: npx jest apps/${{ matrix.service }}

      - name: Build Project
        run: npm run build ${{ matrix.service }}

  # Job 3: Build Docker Images (Only runs if Job 2 passes)
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        service: [api-gateway, user-service, email-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          # Context must be root for monorepo Dockerfiles
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false # Set to true once you add a Registry Login step
          tags: notification-app/${{ matrix.service }}:latest
          # This speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
