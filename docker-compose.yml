version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev api-gateway
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - user-service
  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
      target: development
    ports:
      - "3001:3000" # Mapping to a different host port to avoid conflicts
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev user-service
    environment:
      - NODE_ENV=development
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=user-db
      - RABBITMQ_URL=amqp://rabbitmq:5672
      # Mailtrap SMTP configuration
      - SMTP_HOST=sandbox.smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=e276d8beec1d40  # TODO: Replace with actual Mailtrap username
      - SMTP_PASS=145e471a4069b2  # TODO: Replace with actual Mailtrap password
    networks:
      - user-service
    depends_on:
      user-db:
        condition: service_healthy
  # PostgreSQL Database Service for the user-service
  user-db:
    # Uses a lightweight Alpine Linux version of PostgreSQL 16 for a smaller image size
    image: postgres:16-alpine
    # Explicitly names the container instead of letting Docker auto-generate a generic name
    container_name: user-db
    # Maps the host's port 5432 to the container's port 5432, allowing you to connect locally (e.g. pgAdmin)
    ports:
      - "5432:5432"
    # Sets up the initial database credentials and database name when the container first starts
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=user-db
    # Mounts a specific named volume to ensure database data persists even if the container is removed
    volumes:
      - user-db-data:/var/lib/postgresql/data
    # Places the database on a custom network so other services can resolve it by the name "user-db"
    networks:
      - user-service
    # Periodically pings the database to ensure it's ready to accept connections before other services start relying on it
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  # Redis Service for token blacklisting and caching
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - user-service
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  # RabbitMQ Service for asynchronous messaging
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - user-service
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
  email-service:
    build:
      context: .
      dockerfile: apps/email-service/Dockerfile
      target: development
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - SMTP_HOST=sandbox.smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=e276d8beec1d40
      - SMTP_PASS=145e471a4069b2
      - SMTP_FROM=noreply@notification-system.com
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev email-service
    networks:
      - user-service
    depends_on:
      rabbitmq:
        condition: service_healthy

# Root-level declarations for the named volumes and networks used above
volumes:
  user-db-data:
  rabbitmq-data:

networks:
  user-service: